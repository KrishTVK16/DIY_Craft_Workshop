<!DOCTYPE html>
<html lang="en">

<head>

    <title>Coming Soon - DIY Craft Studio</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

<body
    style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; background: var(--secondary);">

    <div class="animate-on-scroll" data-animation="fade-in-up"

        <i class="fa-solid fa-paintbrush" style="font-size: 60px; color: var(--primary); margin-bottom: 20px;"></i>

        <p class="mb-4" style="color: #666;">We are working hard to bring you this new feature. Stay tuned for updates.

        <form style="display: flex; gap: 10px; max-width: 400px; margin: 0 auto 30px;">
            <input type="email" placeholder="Enter your email"
                style="flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 50px; outline: none;">
            <button class="btn btn-primary" style="border-radius: 50px;">Notify Me</button>
        </form>

        <a href="index.html" style="color: var(--primary); font-weight: 600;">&larr; Back to Home 1</a>
