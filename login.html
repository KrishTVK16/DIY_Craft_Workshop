<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DIY Craft Studio</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="assets/favicon (2).ico">
</head>

<body style="min-height: 100vh; display: flex; flex-direction: column;">
    <!-- Header -->
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-paintbrush"></i> DIY<span>Craft</span>Studio
            </a>

            <nav class="nav-menu">
                <a href="index.html" class="nav-item">Home 1</a>
                <a href="home2.html" class="nav-item">Home 2</a>
                <a href="about.html" class="nav-item">About</a>
                <a href="services.html" class="nav-item">Workshops</a>
                <a href="services.html" class="nav-item">Kits</a>
                <a href="services.html" class="nav-item">Tutorials</a>
                <a href="blog.html" class="nav-item">Blog</a>
                <a href="pricing.html" class="nav-item">Pricing</a>
                <a href="contact.html" class="nav-item">Contact</a>
            </nav>

            <div class="nav-actions">
                <div class="theme-toggle" id="theme-toggle" title="Toggle Light/Dark Mode">
                    <i class="fa-solid fa-moon"></i>
                    <i class="fa-solid fa-sun"></i>
                </div>
                <a href="login.html" class="nav-item active">Login</a>
                <a href="register.html" class="btn btn-primary">Sign Up</a>
                <div class="hamburger">
                    <i class="fa-solid fa-bars"></i>
                </div>
            </div>
        </div>
    </header>

    <!-- Mobile Menu Overlay -->
    <div class="mobile-menu">
        <div class="mobile-menu-content">
            <a href="index.html" class="sidebar-item"><i class="fa-solid fa-house"></i> Home 1</a>
            <a href="home2.html" class="sidebar-item"><i class="fa-solid fa-store"></i> Home 2</a>
            <a href="about.html" class="sidebar-item"><i class="fa-solid fa-circle-info"></i> About</a>
            <a href="services.html" class="sidebar-item"><i class="fa-solid fa-palette"></i> Workshops</a>
            <a href="services.html" class="sidebar-item"><i class="fa-solid fa-box-open"></i> Kits</a>
            <a href="services.html" class="sidebar-item"><i class="fa-solid fa-video"></i> Tutorials</a>
            <a href="blog.html" class="sidebar-item"><i class="fa-solid fa-newspaper"></i> Blog</a>
            <a href="pricing.html" class="sidebar-item"><i class="fa-solid fa-tags"></i> Pricing</a>
            <a href="contact.html" class="sidebar-item"><i class="fa-solid fa-envelope"></i> Contact</a>
            <hr>
            <div class="mobile-auth-links">
                <a href="login.html" class="btn btn-outline active">Login</a>
                <a href="register.html" class="btn btn-primary">Sign Up</a>
            </div>
        </div>
    </div>
    <div class="overlay"></div>
    <div
        style="flex: 1; display: flex; align-items: center; justify-content: center; background: var(--secondary); padding: 20px;">
        <div class="animate-on-scroll" data-animation="fade-in-up"
            style="background: var(--bg-card); padding: 30px 25px; border-radius: 20px; box-shadow: var(--card-shadow); max-width: 400px; width: 100%;">

            <div class="text-center mb-4">
                <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 20px;">
                    <i class="fa-solid fa-paintbrush"></i> DIY<span>Craft</span>Studio
                </a>
                <h2 style="margin-bottom: 20px; font-size: 24px;">Welcome Back!</h2>
            </div>

            <form action="dashboard.html">
                <div class="mb-3">
                    <label style="display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px;">Email</label>
                    <input type="email" placeholder="john@example.com"
                        style="width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--tertiary); border-radius: 10px; outline: none; font-size: 14px;">
                </div>

                <div class="mb-3">
                    <label
                        style="display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px;">Password</label>
                    <input type="password" placeholder="••••••••"
                        style="width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); background: var(--bg-input); color: var(--tertiary); border-radius: 10px; outline: none; font-size: 14px;">
                </div>

                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 13px;">
                    <label
                        style="cursor: pointer; display: flex; align-items: center; gap: 5px; color: var(--text-muted);">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" style="color: var(--primary);">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px;">Login</button>
            </form>

            <div class="text-center">
                <div style="display: flex; align-items: center; margin: 25px 0 20px;">
                    <hr style="flex: 1; border: 0; border-top: 1px solid var(--border-color);">
                    <span style="padding: 0 10px; color: var(--text-muted); font-size: 12px; font-weight: 500;">OR
                        CONTINUE WITH</span>
                    <hr style="flex: 1; border: 0; border-top: 1px solid var(--border-color);">
                </div>

                <div style="display: flex; gap: 12px; justify-content: center; margin-bottom: 20px;">
                    <button class="btn-social btn-google"><i class="fa-brands fa-google"></i></button>
                    <button class="btn-social btn-facebook"><i class="fa-brands fa-facebook-f"></i></button>
                </div>

                <p style="font-size: 14px; color: var(--text-muted);">New user? <a href="register.html"
                        style="color: var(--primary); font-weight: 600;">Sign Up</a></p>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>

</html>
