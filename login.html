<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - DIY Craft Studio</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="shortcut icon" href="favicon.ico">
</head>

<body style="min-height: 100vh; display: flex; flex-direction: column;">

    <!-- Header (Simplified) -->
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-paintbrush"></i> DIY<span>Craft</span>Studio
            </a>
            <div class="nav-actions">
                <span style="font-size: 14px; color: #666; margin-right: 10px;">New here?</span>
                <a href="register.html" class="btn btn-outline" style="padding: 8px 20px;">Sign Up</a>
            </div>
        </div>
    </header>

    <!-- Login Form -->
    <div
        style="flex: 1; display: flex; align-items: center; justify-content: center; background: #f9f9f9; padding: 40px 20px;">
        <div class="animate-on-scroll" data-animation="fade-in-up"
            style="background: white; padding: 40px; border-radius: 20px; box-shadow: var(--card-shadow); max-width: 400px; width: 100%;">
            <div class="text-center mb-4">
                <h2 style="margin-bottom: 10px;">Welcome Back!</h2>
                <p style="color: #666;">Login to access your courses and orders.</p>
            </div>

            <form action="dashboard.html">
                <div class="mb-3">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Email</label>
                    <input type="email" placeholder="john@example.com"
                        style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none;">
                </div>

                <div class="mb-3">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Password</label>
                    <input type="password" placeholder="••••••••"
                        style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none;">
                </div>

                <div
                    style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; font-size: 14px;">
                    <label style="cursor: pointer; display: flex; align-items: center; gap: 5px;">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" style="color: var(--primary);">Forgot Password?</a>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-bottom: 20px;">Login</button>
            </form>

            <div class="text-center" style="font-size: 14px; color: #666;">
                Or continue with <br><br>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <button
                        style="width: 50px; height: 50px; border: 1px solid #ddd; border-radius: 50%; background: white; cursor: pointer;"><i
                            class="fa-brands fa-google"></i></button>
                    <button
                        style="width: 50px; height: 50px; border: 1px solid #ddd; border-radius: 50%; background: white; cursor: pointer;"><i
                            class="fa-brands fa-facebook"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>

</html>
