<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - DIY Craft Studio</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body style="min-height: 100vh; display: flex; flex-direction: column;">

    <!-- Header (Simplified) -->
    <header class="header">
        <div class="container nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-paintbrush"></i> DIY<span>Craft</span>Studio
            </a>
            <div class="nav-actions">
                <span style="font-size: 14px; color: #666; margin-right: 10px;">Already have an account?</span>
                <a href="login.html" class="btn btn-outline" style="padding: 8px 20px;">Login</a>
            </div>
        </div>
    </header>

    <!-- Register Form -->
    <div
        style="flex: 1; display: flex; align-items: center; justify-content: center; background: #f9f9f9; padding: 40px 20px;">
        <div
            style="background: white; padding: 40px; border-radius: 20px; box-shadow: var(--card-shadow); max-width: 400px; width: 100%;">
            <div class="text-center mb-4">
                <h2 style="margin-bottom: 10px;">Create Account</h2>
                <p style="color: #666;">Join our community of makers today.</p>
            </div>

            <form action="dashboard.html">
                <div class="mb-3">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Full Name</label>
                    <input type="text" placeholder="John Doe"
                        style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none;">
                </div>

                <div class="mb-3">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Email</label>
                    <input type="email" placeholder="john@example.com"
                        style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none;">
                </div>

                <div class="mb-3">
                    <label style="display: block; margin-bottom: 8px; font-weight: 500;">Password</label>
                    <input type="password" placeholder="••••••••"
                        style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none;">
                </div>

                <div class="mb-3">
                    <label
                        style="cursor: pointer; display: flex; align-items: flex-start; gap: 10px; font-size: 14px; color: #666;">
                        <input type="checkbox" style="margin-top: 5px;">
                        I agree to the Terms of Service and Privacy Policy
                    </label>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%;">Sign Up</button>
            </form>
        </div>
    </div>

</body>

</html>
